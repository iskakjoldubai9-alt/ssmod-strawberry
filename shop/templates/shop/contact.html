<style>
    .contact-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 60px;
        align-items: center;
        min-height: 70vh;
    }

    .contact-content h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2.5rem, 8vw, 4rem);
        margin-bottom: 10px;
        letter-spacing: -2px;
        padding-top: 50px;
    }

    .contact-content p {
        font-size: 1.1rem;
        opacity: 0.6;
        margin-bottom: 50px;
    }

    /* СОЦИАЛДЫК ТАРМАКТАР */
    .social-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .social-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 30px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 100px;
        text-decoration: none;
        color: inherit;
        transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
    }

    .social-card:hover {
        background: #fff;
        color: #000;
        transform: scale(1.02);
    }

    .brand-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .brand-info img {
        width: 28px;
        height: 28px;
        object-fit: contain;
    }

    .brand-name {
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 0.85rem;
    }

    .arrow-icon { font-size: 1.2rem; opacity: 0.5; }

    /* КАРТА */
    .map-box {
        position: relative;
        height: 500px;
        border-radius: 40px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .loc-tag {
        position: absolute;
        top: 30px;
        right: 30px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        padding: 12px 25px;
        border-radius: 50px;
        font-size: 0.8rem;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.2);
        z-index: 10;
        color: #fff;
    }

    @media (max-width: 900px) {
        .contact-grid { grid-template-columns: 1fr; text-align: center; }
        .contact-content h1 { font-size: 3rem; }
        .social-card { padding: 18px 25px; }
        .map-box { height: 350px; margin-top: 30px; }
    }
</style>

<script>
    const contactTranslations = {
        ky: {
            contact_title: "Байланыш.",
            contact_subtitle: "Биз менен бир тийүү аркылуу байланышыңыз.",
            address_text: "Бишкек ш., Атбашы көч., 6"
        },
        ru: {
            contact_title: "Контакты.",
            contact_subtitle: "Свяжитесь с нами одним касанием.",
            address_text: "г. Бишкек, ул. Атбашинская, 6"
        },
        en: {
            contact_title: "Contact.",
            contact_subtitle: "Connect with us in one touch.",
            address_text: "6 Atbashinskaya St, Bishkek"
        }
    };

    function updateContactLang() {
        const lang = localStorage.getItem('selectedLanguage') || 'ky';
        const t = contactTranslations[lang];

        document.querySelectorAll('[data-lang-key]').forEach(el => {
            const key = el.getAttribute('data-lang-key');
            if (t && t[key]) {
                el.textContent = t[key];
            }
        });
    }

    document.addEventListener('DOMContentLoaded', updateContactLang);
    setInterval(updateContactLang, 1000);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
