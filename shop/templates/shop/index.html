{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />

<style>
    :root {
        --accent-rose: #ff4d6d;
        --soft-gold: #d4af37;
        --glass-bg: rgba(255, 255, 255, 0.05);
    }

    .hero-section {
        min-height: 85vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at top right, #fff5f7 0%, var(--bg) 60%);
        padding: 40px 0;
    }

    .main-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 40px;
        z-index: 10;
        gap: 60px;
    }

    .hero-text { flex: 1.5; text-align: left; }

    .premium-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 5px 12px;
        background: rgba(255, 77, 109, 0.1);
        border-radius: 50px;
        color: var(--accent-rose);
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 77, 109, 0.15);
    }

    .hero-text h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2.2rem, 4vw, 3.8rem);
        line-height: 1.2;
        margin-bottom: 20px;
        color: var(--text);
    }

    .hero-text h1 em { color: var(--accent-rose); font-style: italic; font-weight: 400; }

    .hero-text p {
        font-family: 'Montserrat', sans-serif;
        font-size: 1rem;
        line-height: 1.7;
        opacity: 0.75;
        max-width: 500px;
        margin-bottom: 30px;
        border-left: 2px solid var(--accent-rose);
        padding-left: 15px;
    }

    /* ВИДЕО ЖАНА ГЛАСС КАРТА */
    .video-wrapper { flex: 0.7; display: flex; justify-content: center; align-items: center; }

    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 30px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }

    .strawberry-video {
        width: 280px;
        height: auto;
        border-radius: 22px;
        display: block;
        background: #fff5f7; /* Видео ачылганча назик фон */
        opacity: 0; /* Башында көрүнбөйт */
        transition: opacity 1s ease-in-out;
        object-fit: cover;
    }

    /* Видео даяр болгондо иштеген класс */
    .video-loaded {
        opacity: 1;
    }

    .glass-card:hover {
        transform: translateY(-10px) scale(1.02);
        border-color: var(--accent-rose);
        box-shadow: 0 30px 60px rgba(255, 77, 109, 0.2);
    }

    .blob {
        position: absolute;
        filter: blur(70px);
        border-radius: 50%;
        opacity: 0.08;
        z-index: 1;
    }

    @media (max-width: 991px) {
        .main-container { flex-direction: column; text-align: center; gap: 30px; }
        .hero-text { order: 2; width: 100%; }
        .video-wrapper { order: 1; width: 100%; }
        .strawberry-video { width: 240px; }
        .hero-text p { border-left: none; padding-left: 0; margin: 0 auto 30px; }
    }
</style>

<section class="hero-section">
    <div class="blob" style="width: 250px; height: 250px; background: var(--accent-rose); right: 10%; top: 15%;"></div>
    <div class="blob" style="width: 180px; height: 180px; background: var(--soft-gold); left: 10%; bottom: 20%;"></div>

    <div class="main-container">
        <div class="hero-text" data-aos="fade-right" data-aos-duration="1200">
            <div class="premium-badge">
                <span>●</span> SSMOD Strawberry Art
            </div>
            <h1 data-lang-key="hero_title">Бельгия шоколады <br>менен <em>өзгөчө белек</em></h1>
            <p data-lang-key="hero_desc">Биз ар бир кулпунайды сүйүү менен даярдайбыз. Жаңы мөмөлөр жана премиум шоколад — сиздин жакындарыңыз үчүн эң сонун тандоо.</p>

            <a href="{% url 'price' %}" class="order-btn" style="text-decoration: none; padding: 16px 35px; background: var(--text); color: var(--bg); border-radius: 12px; font-weight: 600; display: inline-block; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1);" data-lang-key="hero_btn">
                Заказ берүү →
            </a>
        </div>

        <div class="video-wrapper" data-aos="fade-left" data-aos-delay="300">
            <div class="glass-card">
                <video class="strawberry-video"
                       id="heroVideo"
                       autoplay
                       muted
                       loop
                       playsinline
                       preload="auto">
                    <source src="{% static 'videos/strawberry_360.mp4' %}" type="video/mp4">
                    Видеону браузер колдобойт.
                </video>
            </div>
        </div>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
// --- 🌍 КОТОРМОЛОР СӨЗДҮГҮ ---
const homeTranslations = {
    ky: {
        hero_title: 'Бельгия шоколады <br>менен <em>өзгөчө белек</em>',
        hero_desc: 'Биз ар бир кулпунайды сүйүү менен даярдайбыз. Жаңы мөмөлөр жана премиум шоколад — сиздин жакындарыңыз үчүн эң сонун тандоо.',
        hero_btn: 'Заказ берүү →'
    },
    ru: {
        hero_title: 'Бельгийский шоколад <br>— <em>особенный подарок</em>',
        hero_desc: 'Мы готовим каждую клубнику с любовью. Свежие ягоды и премиальный шоколад — идеальный выбор для ваших близких.',
        hero_btn: 'Заказать →'
    },
    en: {
        hero_title: 'Belgian Chocolate <br>— <em>A Special Gift</em>',
        hero_desc: 'We prepare every strawberry with love. Fresh berries and premium chocolate — the perfect choice for your loved ones.',
        hero_btn: 'Order Now →'
    }
};

function updateHomeLanguage() {
    // localStorage'дан тилди алуу (эгер жок болсо 'ky' дефолт болот)
    let lang = localStorage.getItem('selectedLanguage');

    // Эгер сенин набарыңда 'en' эмес 'eng' деп сакталса, аны оңдоп коёбуз
    if (lang === 'eng') lang = 'en';
    if (!lang) lang = 'ky';

    const t = homeTranslations[lang];

    if (t) {
        document.querySelectorAll('[data-lang-key]').forEach(el => {
            const key = el.getAttribute('data-lang-key');
            if (t[key]) {
                el.innerHTML = t[key];
            }
        });
    }
}

// Тил алмашса дароо иштетүү
window.addEventListener('storage', (e) => {
    if (e.key === 'selectedLanguage') {
        updateHomeLanguage();
    }
});

// Башка барактардан тил алмашканда да иштеши үчүн
window.addEventListener('languageChanged', updateHomeLanguage);

// Барак жаңыланганда же ачылганда иштетүү
document.addEventListener('DOMContentLoaded', updateHomeLanguage);

// Текшерүү үчүн (ар бир секунд сайын)
setInterval(updateHomeLanguage, 1000);

window.addEventListener('languageChanged', updateHomeLanguage);
setInterval(updateHomeLanguage, 1000);

document.addEventListener('DOMContentLo

aded', function() {
    updateHomeLanguage();
    AOS.init({ duration: 1000, once: true });

    const video = document.getElementById('heroVideo');

    if (video) {
        // 1. Видео толук жүктөлгөндө же ойноого даяр болгондо ишке кирет
        video.addEventListener('loadeddata', function() {
            video.classList.add('video-loaded');
        });

        // 2. Эгер видео кеште (cache) бар болсо дароо көрсөтүү
        if (video.readyState >= 3) {
            video.classList.add('video-loaded');
        }

        // 3. Мажбурлап ойнотуу (Кээ бир браузерлер үчүн)
        video.play().catch(error => {
            console.log("Авто-ойнотуу токтотулду, колдонуучунун аракети күтүлүүдө.");
        });
    }
});
</script>
{% endblock %}
