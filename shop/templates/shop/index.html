{% extends 'shop/base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />

<style>
    :root {
        --accent-rose: #ff4d6d;
        --soft-gold: #d4af37;
        --glass-bg: rgba(255, 255, 255, 0.05);
    }

    .hero-section {
        min-height: 85vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at top right, #fff5f7 0%, var(--bg) 60%);
        padding: 40px 0;
    }

    .main-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 40px;
        z-index: 10;
        gap: 60px;
    }

    .hero-text { flex: 1.5; text-align: left; }

    .premium-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 5px 12px;
        background: rgba(255, 77, 109, 0.1);
        border-radius: 50px;
        color: var(--accent-rose);
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 77, 109, 0.15);
    }

    .hero-text h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2.2rem, 4vw, 3.8rem);
        line-height: 1.2;
        margin-bottom: 20px;
        color: var(--text);
    }

    .hero-text h1 em { color: var(--accent-rose); font-style: italic; font-weight: 400; }

    .hero-text p {
        font-family: 'Montserrat', sans-serif;
        font-size: 1rem;
        line-height: 1.7;
        opacity: 0.75;
        max-width: 500px;
        margin-bottom: 30px;
        border-left: 2px solid var(--accent-rose);
        padding-left: 15px;
    }

    .video-wrapper { flex: 0.7; display: flex; justify-content: center; align-items: center; }

    .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border-radius: 25px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        transition: 0.5s ease-in-out;
    }

    .strawberry-video {
        width: 280px;
        height: auto;
        border-radius: 18px;
        display: block;
        transition: 0.5s ease;
        background: #000;
    }

    .glass-card:hover {
        transform: translateY(-5px) rotate(1deg);
        border-color: var(--accent-rose);
        box-shadow: 0 20px 40px rgba(255, 77, 109, 0.15);
    }

    .blob {
        position: absolute;
        filter: blur(70px);
        border-radius: 50%;
        opacity: 0.08;
        z-index: 1;
    }

    @media (max-width: 991px) {
        .main-container { flex-direction: column; text-align: center; gap: 30px; }
        .hero-text { order: 2; width: 100%; }
        .video-wrapper { order: 1; width: 100%; }
        .strawberry-video { width: 240px; }
        .hero-text p { border-left: none; padding-left: 0; margin: 0 auto 30px; }
    }
</style>

<section class="hero-section">
    <div class="blob" style="width: 250px; height: 250px; background: var(--accent-rose); right: 10%; top: 15%;"></div>
    <div class="blob" style="width: 180px; height: 180px; background: var(--soft-gold); left: 10%; bottom: 20%;"></div>

    <div class="main-container">
        <div class="hero-text" data-aos="fade-up" data-aos-duration="1200">
            <div class="premium-badge">
                <span>●</span> SSMOD Strawberry Art
            </div>
            <h1 data-lang-key="hero_title">Бельгия шоколады <br>менен <em>өзгөчө белек</em></h1>
            <p data-lang-key="hero_desc">Биз ар бир кулпунайды сүйүү менен даярдайбыз. Жаңы мөмөлөр жана премиум шоколад — сиздин жакындарыңыз үчүн эң сонун тандоо.</p>

            <a href="{% url 'price' %}" class="order-btn" style="text-decoration: none; padding: 14px 30px; background: var(--text); color: var(--bg); border-radius: 8px; font-weight: 600; display: inline-block; transition: 0.3s;" data-lang-key="hero_btn">
                Заказ берүү →
            </a>
        </div>

        <div class="video-wrapper" data-aos="zoom-in" data-aos-delay="300">
            <div class="glass-card">
                <video class="strawberry-video" autoplay muted loop playsinline preload="auto">
                    <source src="{% static 'videos/strawberry_360.mp4' %}" type="video/mp4">
                    Видеону браузер колдобойт.
                </video>
            </div>
        </div>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
// --- 🌍 КОТОРМОЛОР СӨЗДҮГҮ ---
const homeTranslations = {
    ky: {
        hero_title: 'Бельгия шоколады <br>менен <em>өзгөчө белек</em>',
        hero_desc: 'Биз ар бир кулпунайды сүйүү менен даярдайбыз. Жаңы мөмөлөр жана премиум шоколад — сиздин жакындарыңыз үчүн эң сонун тандоо.',
        hero_btn: 'Заказ берүү →'
    },
    ru: {
        hero_title: 'Бельгийский шоколад <br>— <em>особенный подарок</em>',
        hero_desc: 'Мы готовим каждую клубнику с любовью. Свежие ягоды и премиальный шоколад — идеальный выбор для ваших близких.',
        hero_btn: 'Заказать →'
    },
    en: {
        hero_title: 'Belgian Chocolate <br>— <em>A Special Gift</em>',
        hero_desc: 'We prepare every strawberry with love. Fresh berries and premium chocolate — the perfect choice for your loved ones.',
        hero_btn: 'Order Now →'
    }
};

// Тилди жаңыртуу функциясы
function updateHomeLanguage() {
    const lang = localStorage.getItem('selectedLanguage') || 'ky';
    const t = homeTranslations[lang];

    document.querySelectorAll('[data-lang-key]').forEach(el => {
        const key = el.getAttribute('data-lang-key');
        if (t && t[key]) {
            el.innerHTML = t[key];
        }
    });
}

// 🔥 ЖАҢЫ: Тил баскычы басылганда бул бетти дароо которуу үчүн Event Listener
window.addEventListener('languageChanged', function() {
    updateHomeLanguage();
});

// 🔥 ЖАҢЫ: Кошумча камсыздандыруу (Тил баскычы басылганын текшерип турат)
setInterval(updateHomeLanguage, 500);

document.addEventListener('DOMContentLoaded', function() {
    // Баштапкы жүктөөдө тилди коюу
    updateHomeLanguage();

    // AOS анимациясын иштетүү
    AOS.init({ duration: 1000, once: true });

    // Видео мажбурлап ойнотуу
    var video = document.querySelector('.strawberry-video');
    if (video) {
        video.play().catch(function(error) {
            console.log("Video play failed:", error);
        });
    }
});
</script>
{% endblock %}
